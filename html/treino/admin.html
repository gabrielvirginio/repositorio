<!doctype html>
<html lang="en">
  <head>
    <style>
      .Pendente {
        background-color: #ffcc26;
      }

      .Confirmado {
        background-color: #3ef357;
      }

      .Concluído {
        background-color: #368dff;
      }

      .Cancelado {
        background-color: #ff1225;
      }
    </style>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel Admin</title>
  </head>
  <body>
    <div class="filtro-avan">
      <button onclick="toggleFiltros()">Filtros Avançados</button>

      <div id="filtrosAvancados" style="display: none">
        <input type="search" id="filtroNome" placeholder="Nome" />

        <input type="search" id="filtroTelefone" placeholder="Telefone" />

        <input type="search" id="filtroServico" placeholder="Serviço" />

        <div>
          <input
            type="date"
            id="filtroData"
            onchange="carregarAgendamentos()"
          />
          <button onclick="limparData('filtroData')">✕</button>
        </div>

        <div>
          <input type="time" id="filtroHorario" />
          <button onclick="limparHorario('filtroHorario')">✕</button>
        </div>
      </div>

      <button onclick="limparFiltros()">Limpar Filtros</button>

      <div>
        <button onclick="carregarAgendamentos()">Buscar</button>
      </div>
    </div>
    <h1>Agendamentos</h1>
    <input
      type="search"
      id="buscaRapida"
      placeholder="Buscar por nome, telefone ou serviço..."
      oninput="carregarAgendamentos()"
    />

    <select id="filtroStatus" onchange="carregarAgendamentos()">
      <option value="ativos">Ativos</option>
      <option value="Pendente">Pendente</option>
      <option value="Confirmado">Confirmado</option>
      <option value="Concluído">Concluído</option>
      <option value="Cancelado">Cancelado</option>
      <option value="todos">Todos</option>
    </select>
    <table border="1">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Telefone</th>
          <th>Serviço</th>
          <th>Data</th>
          <th>Horário</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody id="listaAgendamentos"></tbody>
    </table>

    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

    <script>
      const supabaseUrl = "https://fipablognksvoeqwcjib.supabase.co";
      const supabaseKey =
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpcGFibG9nbmtzdm9lcXdjamliIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk5MjYxODksImV4cCI6MjA5NTUwMjE4OX0.ZHod0PNQ3SOptzzqnX8jkOWeCJTLtW4GEH2FzthiZVQ";

      const clienteSupabase = window.supabase.createClient(
        supabaseUrl,
        supabaseKey,
      );

      async function carregarAgendamentos() {
        const buscaRapida = document.getElementById("buscaRapida").value.trim();

        const filtroStatus = document.getElementById("filtroStatus").value;

        const tabela = document.getElementById("listaAgendamentos");
        tabela.innerHTML = "";

        const filtroNome = document.getElementById("filtroNome").value;

        const filtroTelefone = document.getElementById("filtroTelefone").value;

        const filtroServico = document.getElementById("filtroServico").value;

        const filtroData = document.getElementById("filtroData").value;

        const filtroHorario = document.getElementById("filtroHorario").value;

        let consulta = clienteSupabase
          .from("Agendamentos")
          .select("id, nome, telefone, servico, data, horario, status")
          .order("data")
          .order("horario");

        if (filtroStatus === "ativos") {
          consulta = consulta.in("status", ["Pendente", "Confirmado"]);
        } else if (filtroStatus !== "todos") {
          consulta = consulta.eq("status", filtroStatus);
        }

        if (buscaRapida) {
          consulta = consulta.or(
            `nome.ilike.%${buscaRapida}%,telefone.ilike.%${buscaRapida}%,servico.ilike.%${buscaRapida}%`,
          );
        }

        if (filtroNome) {
          consulta = consulta.ilike("nome", `%${filtroNome}%`);
        }

        if (filtroTelefone) {
          consulta = consulta.ilike("telefone", `%${filtroTelefone}%`);
        }

        if (filtroServico) {
          consulta = consulta.ilike("servico", `%${filtroServico}%`);
        }

        if (filtroData) {
          consulta = consulta.eq("data", filtroData);
        }

        if (filtroHorario) {
          consulta = consulta.eq("horario", filtroHorario);
        }
        consulta = consulta.order("data").order("horario");

        const { data, error } = await consulta;
        const hoje = [];

        const amanha = [];

        const proximosDias = [];

        if (error) {
          console.error(error);
          return;
        }

        data.forEach((agendamento) => {
          const grupo = obterTituloData(agendamento.data);

          if (grupo === "Hoje") {
            hoje.push(agendamento);
          } else if (grupo === "Amanhã") {
            amanha.push(agendamento);
          } else {
            proximosDias.push(agendamento);
          }
        });

        renderizarGrupo("Hoje", hoje, tabela);

        renderizarGrupo("Amanhã", amanha, tabela);

        renderizarGrupo("Próximos Dias", proximosDias, tabela);
      }

      function obterTituloData(dataBanco) {
        const hoje = new Date();

        const ano = hoje.getFullYear();
        const mes = String(hoje.getMonth() + 1).padStart(2, "0");
        const dia = String(hoje.getDate()).padStart(2, "0");

        const hojeFormatado = `${ano}-${mes}-${dia}`;

        const amanha = new Date();
        amanha.setDate(amanha.getDate() + 1);

        const anoAmanha = amanha.getFullYear();
        const mesAmanha = String(amanha.getMonth() + 1).padStart(2, "0");
        const diaAmanha = String(amanha.getDate()).padStart(2, "0");

        const amanhaFormatado = `${anoAmanha}-${mesAmanha}-${diaAmanha}`;

        if (dataBanco === hojeFormatado) {
          return "Hoje";
        }

        if (dataBanco === amanhaFormatado) {
          return "Amanhã";
        }

        return "Próximos Dias";
      }

      /*expandir grupo*/
      function alternarGrupo(idGrupo) {
        const linhas = document.querySelectorAll(`.${idGrupo}`);

        linhas.forEach((linha) => {
          if (linha.style.display === "none") {
            linha.style.display = "";
          } else {
            linha.style.display = "none";
          }
        });
      }
      function renderizarGrupo(titulo, registros, tabela) {
        const idGrupo = titulo.replace(/\s+/g, "");
        if (registros.length === 0) return;

        tabela.innerHTML += `
        <tr>
          <td
            colspan="6"
            style="cursor:pointer"
            onclick="alternarGrupo('${idGrupo}')"
          >
            <strong>
              📅 ${titulo} (${registros.length})
            </strong>
          </td>
        </tr>
        `;

        registros.sort((a, b) => a.horario.localeCompare(b.horario));

        registros.forEach((agendamento) => {
          tabela.innerHTML += `
      <tr class="${idGrupo}">
        <td>${agendamento.nome}</td>
        <td>${agendamento.telefone}</td>
        <td>${agendamento.servico}</td>
        <td>${agendamento.data}</td>
        <td>${agendamento.horario}</td>

        <td>
          <select class="${agendamento.status}"
           onchange="alterarStatus(${agendamento.id}, this.value)">

            <option value="Pendente"
              ${agendamento.status === "Pendente" ? "selected" : ""}>
              Pendente
            </option>

            <option value="Confirmado"
              ${agendamento.status === "Confirmado" ? "selected" : ""}>
              Confirmado
            </option>

            <option value="Concluído"
              ${agendamento.status === "Concluído" ? "selected" : ""}>
              Concluído
            </option>

            <option value="Cancelado"
              ${agendamento.status === "Cancelado" ? "selected" : ""}>
              Cancelado
            </option>

          </select>
        </td>
      </tr>
    `;
        });

        registros.forEach((agendamento) => {
          tabela.innerHTML += `
    <tr>
      ...
    </tr>
  `;
        });
      }
      carregarAgendamentos();

      async function alterarStatus(id, novoStatus) {
        console.log("ID:", id);
        console.log("Status:", novoStatus);

        const { error } = await clienteSupabase
          .from("Agendamentos")
          .update({
            status: novoStatus,
          })
          .eq("id", id);

        if (error) {
          console.error(error);
          alert("Erro ao atualizar.");
        } else {
          location.reload();
        }
      }

      function toggleFiltros() {
        const filtros = document.getElementById("filtrosAvancados");

        if (filtros.style.display === "none") {
          filtros.style.display = "block";
        } else {
          filtros.style.display = "none";
        }
      }

      function limparFiltros() {
        document.getElementById("buscaRapida").value = "";

        document.getElementById("filtroNome").value = "";

        document.getElementById("filtroTelefone").value = "";

        document.getElementById("filtroServico").value = "";

        document.getElementById("filtroData").value = "";

        document.getElementById("filtroHorario").value = "";

        document.getElementById("filtroStatus").value = "ativos";

        carregarAgendamentos();
      }

      function limparData() {
        document.getElementById("filtroData").value = "";

        carregarAgendamentos();
      }

      function limparHorario() {
        document.getElementById("filtroHorario").value = "";

        carregarAgendamentos();
      }
    </script>
  </body>
</html>
